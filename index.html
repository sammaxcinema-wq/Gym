<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>GYM ADMIN · Pro SaaS</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Font (Inter) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* main app card */
    .app-container {
      max-width: 1320px;
      width: 100%;
      background: #ffffff;
      border-radius: 36px;
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      transition: all 0.2s;
    }

    /* ===== PRO AUTH HEADER ===== */
    .auth-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      background: #ffffff;
      border-bottom: 1px solid #eef2f6;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 20px;
      color: #0b1e33;
      letter-spacing: -0.3px;
    }
    .brand i { color: #2563eb; font-size: 22px; }

    .auth-badge {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8fafc;
      padding: 4px 14px 4px 8px;
      border-radius: 40px;
      border: 1px solid #e2e8f0;
      cursor: default;
    }
    .user-avatar i { font-size: 18px; color: #1e293b; background: #eef2f6; padding: 6px; border-radius: 30px; }
    .user-avatar span { font-weight: 500; font-size: 14px; color: #0b1e33; }

    .pro-badge {
      background: #2563eb;
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 40px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .auth-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .btn-outline, .btn-primary, .btn-danger, .btn-success {
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      color: #1e293b;
      border: 1px solid #d0d9e8;
    }
    .btn-primary { background: #0b1e33; color: white; border: none; }
    .btn-danger { background: #dc2626; color: white; border: none; }
    .btn-success { background: #16a34a; color: white; border: none; }
    .btn-outline i, .btn-primary i, .btn-danger i, .btn-success i { font-size: 13px; }

    .auth-pro-tag {
      background: #2563eb10;
      border: 1px solid #2563eb20;
      border-radius: 40px;
      padding: 2px 14px 2px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #1e4f9e;
      font-size: 12px;
      font-weight: 500;
    }

    /* ===== DASHBOARD ===== */
    .dashboard {
      padding: 24px 28px 28px;
    }

    .dashboard-title {
      font-size: 24px;
      font-weight: 700;
      color: #0b1e33;
      margin-bottom: 24px;
      letter-spacing: -0.4px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .dashboard-title i { color: #2563eb; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: #f9fafc;
      border-radius: 20px;
      padding: 16px 18px;
      border: 1px solid #edf2f7;
    }
    .stat-label { font-size: 14px; font-weight: 500; color: #64748b; margin-bottom: 6px; }
    .stat-number { font-size: 28px; font-weight: 700; color: #0b1e33; letter-spacing: -0.3px; }
    .stat-number small { font-size: 14px; font-weight: 500; color: #3b4a5e; margin-left: 4px; }
    .stat-icon { float: right; color: #2563eb; opacity: 0.6; font-size: 20px; margin-top: 2px; }

    /* ----- input & control bar ----- */
    .control-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 16px;
      margin-bottom: 20px;
      background: #f8fafc;
      padding: 14px 18px;
      border-radius: 60px;
      border: 1px solid #e9eef4;
    }
    .control-bar .field-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      flex: 1 1 200px;
    }
    .control-bar input, .control-bar select {
      padding: 8px 14px;
      border-radius: 40px;
      border: 1px solid #d0d9e8;
      font-size: 13px;
      background: white;
      flex: 1 1 120px;
      min-width: 100px;
      outline: none;
      transition: 0.2s;
    }
    .control-bar input:focus, .control-bar select:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px #2563eb20;
    }
    .control-bar .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    /* table */
    .table-wrapper {
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid #eef2f6;
      overflow-x: auto;
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 480px;
    }

    th {
      text-align: left;
      padding: 14px 16px;
      background: #fafcff;
      color: #475569;
      font-weight: 600;
      border-bottom: 1px solid #e9eef4;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f4fa;
      color: #1e293b;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }

    .status-badge {
      display: inline-block;
      padding: 3px 14px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 600;
      background: #e6f7e6;
      color: #0b6e4f;
    }
    .status-badge.expired { background: #fee9e7; color: #b34033; }
    .trainer-tag {
      background: #eef2f6;
      padding: 3px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 500;
      color: #1e293b;
      display: inline-block;
    }
    .plan-badge { font-weight: 500; }
    .plan-badge.premium { color: #2563eb; }
    .plan-badge.standard { color: #7c3aed; }
    .plan-badge.basic { color: #64748b; }

    .delete-btn {
      background: transparent;
      border: none;
      color: #dc2626;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 30px;
      transition: 0.2s;
    }
    .delete-btn:hover { background: #fee9e7; }

    .footer-meta {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      color: #64748b;
      font-size: 14px;
      border-top: 1px solid #ecf1f7;
      padding-top: 16px;
      gap: 8px;
    }
    .footer-meta i { margin-right: 6px; color: #2563eb; }

    /* ===== responsive ===== */
    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 720px) {
      .auth-header { flex-direction: column; align-items: stretch; gap: 8px; }
      .auth-badge { justify-content: space-between; }
      .control-bar { flex-direction: column; align-items: stretch; border-radius: 28px; }
      .control-bar .field-group { flex: 1 1 auto; }
      .control-bar input, .control-bar select { flex: 1 1 100%; }
      .dashboard { padding: 16px; }
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat-number { font-size: 24px; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .auth-actions .btn-outline, .auth-actions .btn-primary { font-size: 12px; padding: 4px 12px; }
      .user-avatar span { font-size: 12px; }
      .brand { font-size: 18px; }
      .dashboard-title { font-size: 20px; }
    }

    /* toast notification */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #0b1e33;
      color: white;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 500;
      font-size: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      z-index: 999;
      opacity: 0;
      transition: 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>

<div class="app-container" id="appContainer">

  <!-- PRO AUTH HEADER (with logout + login simulation) -->
  <div class="auth-header">
    <div class="brand">
      <i class="fas fa-dumbbell"></i>
      <span>GYM ADMIN</span>
      <span style="font-weight: 400; font-size: 12px; background: #eef2ff; padding: 2px 10px; border-radius: 30px; color: #2563eb; margin-left: 4px;">SaaS</span>
    </div>
    <div class="auth-badge">
      <div class="user-avatar" id="userAvatar">
        <i class="fas fa-user-circle"></i>
        <span id="userNameDisplay">Coach Alex</span>
        <span class="pro-badge" style="background: #0b1e33;">PRO</span>
      </div>
      <div class="auth-actions">
        <div class="auth-pro-tag"><i class="fas fa-shield-alt"></i> 2FA</div>
        <button class="btn-outline" id="loginToggleBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
        <button class="btn-primary" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <div class="dashboard-title">
      <i class="fas fa-chart-pie"></i> Dashboard
      <span style="font-size: 14px; font-weight: 400; color: #64748b; margin-left: 4px;">· manual data manager</span>
    </div>

    <!-- STATS (auto-updated) -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label"><i class="fas fa-users" style="margin-right: 6px; color:#2563eb;"></i>Total Members</div><div class="stat-number" id="totalMembers">120</div><div class="stat-icon"><i class="fas fa-arrow-up" style="color:#22a65e;"></i></div></div>
      <div class="stat-card"><div class="stat-label"><i class="fas fa-user-check" style="margin-right: 6px; color:#2563eb;"></i>Active</div><div class="stat-number" id="activeMembers">98</div><div class="stat-icon"><i class="fas fa-running"></i></div></div>
      <div class="stat-card"><div class="stat-label"><i class="fas fa-dollar-sign" style="margin-right: 6px; color:#2563eb;"></i>Revenue</div><div class="stat-number" id="monthlyRevenue">$3,200</div><div class="stat-icon"><i class="fas fa-arrow-up" style="color:#22a65e;"></i></div></div>
      <div class="stat-card"><div class="stat-label"><i class="fas fa-chalkboard-teacher" style="margin-right: 6px; color:#2563eb;"></i>Trainers</div><div class="stat-number" id="trainerCount">8</div><div class="stat-icon"><i class="fas fa-dumbbell"></i></div></div>
    </div>

    <!-- CONTROL BAR: input + add / delete selected -->
    <div class="control-bar">
      <div class="field-group">
        <input type="text" id="memberNameInput" placeholder="Full name" value="New Member">
        <select id="planSelect"><option value="Premium">Premium</option><option value="Standard">Standard</option><option value="Basic">Basic</option></select>
        <select id="statusSelect"><option value="Active">Active</option><option value="Expired">Expired</option></select>
        <input type="text" id="trainerInput" placeholder="Trainer" value="Coach New">
      </div>
      <div class="btn-group">
        <button class="btn-success" id="addMemberBtn"><i class="fas fa-plus"></i> Add</button>
        <button class="btn-danger" id="deleteSelectedBtn"><i class="fas fa-trash-alt"></i> Delete selected</button>
        <button class="btn-outline" id="resetDefaultBtn"><i class="fas fa-undo"></i> Reset</button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper">
      <table>
        <thead><tr><th style="width:30px;"><input type="checkbox" id="selectAllCheckbox"></th><th>Name</th><th>Plan</th><th>Status</th><th>Trainer</th><th style="width:50px;">Del</th></tr></thead>
        <tbody id="membersTableBody">
          <!-- dynamic rows -->
        </tbody>
      </table>
    </div>

    <div class="footer-meta">
      <span><i class="fas fa-calendar-alt"></i> April 24, 2026</span>
      <span><i class="fas fa-clock"></i> 23:23 (EAT)</span>
      <span><i class="fas fa-lock"></i> Pro Auth · <span id="authStatusDisplay">active</span></span>
      <span><i class="fas fa-database"></i> <span id="rowCountDisplay">4</span> members</span>
    </div>
  </div>
</div>

<!-- toast -->
<div id="toast" class="toast">✨ Action done</div>

<script>
  (function() {
    // ---------- DATA ----------
    let members = [
      { id: 1, name: 'John Kamau', plan: 'Premium', status: 'Active', trainer: 'Coach Mark' },
      { id: 2, name: 'Jane Wanjiru', plan: 'Basic', status: 'Expired', trainer: 'Coach Alice' },
      { id: 3, name: 'Paul Otieno', plan: 'Standard', status: 'Active', trainer: 'Coach Sam' },
      { id: 4, name: 'Lucy Mwangi', plan: 'Premium', status: 'Active', trainer: 'Coach Mike' }
    ];
    let nextId = 5;

    // auth state
    let isLoggedIn = true;  // start logged in
    let currentUser = 'Coach Alex';

    // DOM refs
    const tbody = document.getElementById('membersTableBody');
    const totalMembersEl = document.getElementById('totalMembers');
    const activeMembersEl = document.getElementById('activeMembers');
    const revenueEl = document.getElementById('monthlyRevenue');
    const trainerCountEl = document.getElementById('trainerCount');
    const rowCountDisplay = document.getElementById('rowCountDisplay');
    const authStatusDisplay = document.getElementById('authStatusDisplay');
    const userNameDisplay = document.getElementById('userNameDisplay');

    // inputs
    const nameInput = document.getElementById('memberNameInput');
    const planSelect = document.getElementById('planSelect');
    const statusSelect = document.getElementById('statusSelect');
    const trainerInput = document.getElementById('trainerInput');

    // buttons
    const addBtn = document.getElementById('addMemberBtn');
    const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
    const resetBtn = document.getElementById('resetDefaultBtn');
    const loginToggleBtn = document.getElementById('loginToggleBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const selectAllCheckbox = document.getElementById('selectAllCheckbox');

    // toast
    const toast = document.getElementById('toast');
    let toastTimeout;

    function showToast(msg) {
      toast.textContent = msg || '✅ Done';
      toast.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // ---------- RENDER ----------
    function renderTable() {
      if (!isLoggedIn) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:30px; color:#64748b;"><i class="fas fa-lock" style="margin-right:10px;"></i>Login to view members</td></tr>`;
        updateStatsAndFooter();
        return;
      }
      let html = '';
      members.forEach(m => {
        const statusClass = m.status === 'Expired' ? 'expired' : '';
        const planClass = m.plan.toLowerCase();
        html += `<tr data-id="${m.id}">
          <td><input type="checkbox" class="row-checkbox"></td>
          <td><strong>${m.name}</strong></td>
          <td><span class="plan-badge ${planClass}">${m.plan}</span></td>
          <td><span class="status-badge ${statusClass}"><i class="fas fa-circle" style="font-size:8px; margin-right:6px; color:${m.status === 'Active' ? '#0b6e4f' : '#b34033'};"></i>${m.status}</span></td>
          <td><span class="trainer-tag"><i class="fas fa-user-tie" style="margin-right:4px;"></i>${m.trainer}</span></td>
          <td><button class="delete-btn" data-id="${m.id}"><i class="fas fa-trash-alt"></i></button></td>
        </tr>`;
      });
      tbody.innerHTML = html;
      updateStatsAndFooter();
      // attach delete events
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const id = parseInt(this.dataset.id);
          deleteMemberById(id);
        });
      });
      // attach row checkbox events for select all sync
      document.querySelectorAll('.row-checkbox').forEach(cb => {
        cb.addEventListener('change', function() {
          const all = document.querySelectorAll('.row-checkbox');
          const checked = document.querySelectorAll('.row-checkbox:checked');
          selectAllCheckbox.checked = (all.length === checked.length && all.length > 0);
        });
      });
      // select all
      selectAllCheckbox.addEventListener('change', function() {
        document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = this.checked);
      });
    }

    function updateStatsAndFooter() {
      const total = members.length;
      const active = members.filter(m => m.status === 'Active').length;
      const revenue = total * 80; // mock $80 per member
      const trainers = [...new Set(members.map(m => m.trainer))].length;
      totalMembersEl.textContent = total;
      activeMembersEl.textContent = active;
      revenueEl.textContent = `$${revenue}`;
      trainerCountEl.textContent = trainers || 0;
      rowCountDisplay.textContent = total;
      // auth status
      authStatusDisplay.textContent = isLoggedIn ? 'active' : 'inactive';
      userNameDisplay.textContent = isLoggedIn ? currentUser : 'Guest';
    }

    // ---------- CRUD ----------
    function addMember() {
      if (!isLoggedIn) { showToast('🔒 Please login first'); return; }
      const name = nameInput.value.trim() || 'Unnamed';
      const plan = planSelect.value;
      const status = statusSelect.value;
      const trainer = trainerInput.value.trim() || 'Coach';
      const newMember = { id: nextId++, name, plan, status, trainer };
      members.push(newMember);
      renderTable();
      showToast(`➕ Added "${name}"`);
    }

    function deleteMemberById(id) {
      if (!isLoggedIn) { showToast('🔒 Login required'); return; }
      const idx = members.findIndex(m => m.id === id);
      if (idx !== -1) {
        const removed = members[idx].name;
        members.splice(idx, 1);
        renderTable();
        showToast(`🗑️ Deleted "${removed}"`);
      }
    }

    function deleteSelected() {
      if (!isLoggedIn) { showToast('🔒 Login first'); return; }
      const checkboxes = document.querySelectorAll('.row-checkbox:checked');
      if (checkboxes.length === 0) { showToast('⚠️ No rows selected'); return; }
      const ids = [];
      checkboxes.forEach(cb => {
        const tr = cb.closest('tr');
        if (tr) {
          const id = parseInt(tr.dataset.id);
          if (!isNaN(id)) ids.push(id);
        }
      });
      if (ids.length === 0) return;
      const count = ids.length;
      members = members.filter(m => !ids.includes(m.id));
      renderTable();
      showToast(`🗑️ Deleted ${count} member(s)`);
    }

    function resetDefault() {
      if (!isLoggedIn) { showToast('🔒 Login to reset'); return; }
      members = [
        { id: 1, name: 'John Kamau', plan: 'Premium', status: 'Active', trainer: 'Coach Mark' },
        { id: 2, name: 'Jane Wanjiru', plan: 'Basic', status: 'Expired', trainer: 'Coach Alice' },
        { id: 3, name: 'Paul Otieno', plan: 'Standard', status: 'Active', trainer: 'Coach Sam' },
        { id: 4, name: 'Lucy Mwangi', plan: 'Premium', status: 'Active', trainer: 'Coach Mike' }
      ];
      nextId = 5;
      renderTable();
      showToast('↩️ Reset to default data');
    }

    // ---------- AUTH ----------
    function toggleLogin() {
      if (isLoggedIn) {
        // already logged in, but we can simulate re-login
        showToast('✅ Already logged in');
        return;
      }
      // login
      isLoggedIn = true;
      currentUser = 'Coach Alex';
      loginToggleBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
      renderTable();
      showToast('🔓 Logged in as ' + currentUser);
    }

    function logout() {
      if (!isLoggedIn) { showToast('⚠️ Already logged out'); return; }
      isLoggedIn = false;
      currentUser = 'Guest';
      loginToggleBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
      renderTable();
      showToast('🔒 Logged out');
    }

    // ---------- INIT ----------
    renderTable();

    // event listeners
    addBtn.addEventListener('click', addMember);
    deleteSelectedBtn.addEventListener('click', deleteSelected);
    resetBtn.addEventListener('click', resetDefault);
    loginToggleBtn.addEventListener('click', toggleLogin);
    logoutBtn.addEventListener('click', logout);

    // quick enter on name field
    nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addMember(); });

    // select all initial sync
    selectAllCheckbox.addEventListener('change', function() {
      document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = this.checked);
    });

    // extra: click on row delete also handled via event delegation (already attached)
    // re-attach after render

    // manual override for login/logout state display
    window.updateAuthUI = function() {
      authStatusDisplay.textContent = isLoggedIn ? 'active' : 'inactive';
      userNameDisplay.textContent = isLoggedIn ? currentUser : 'Guest';
    };
    // override render to also update auth UI
    const originalRender = renderTable;
    renderTable = function() {
      originalRender();
      authStatusDisplay.textContent = isLoggedIn ? 'active' : 'inactive';
      userNameDisplay.textContent = isLoggedIn ? currentUser : 'Guest';
    };
    // re-run
    renderTable();

    // ensure login toggle text
    loginToggleBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    if (isLoggedIn) loginToggleBtn.innerHTML = '<i class="fas fa-user-check"></i> Logged in';
    // but we want it to act as login toggle: if logged in, show "Login" but it does nothing? we use toggleLogin
    // better: always show "Login" as a login button
    loginToggleBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    // if logged in, we can still show login but it will say already logged in
    // fine.

    // add small fix: if logged in, change button text?
    // we want a clear login/logout: login button always says login, logout logs out.
    // but we want "Login" to work as re-login / switch user? we keep it.
    console.log('GYM ADMIN SaaS · Pro Auth + CRUD ready');
  })();
</script>
</body>
</html>
